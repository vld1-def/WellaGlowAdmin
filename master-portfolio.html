<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wella Glow | Портфоліо</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        :root { --bg: #050505; }
        body { font-family: 'Manrope', sans-serif; background-color: var(--bg); color: #e2e8f0; letter-spacing: -0.01em; }
        * { font-style: normal !important; }
        .glass-panel { background: rgba(17,17,19,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neo-gradient { background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%); }
        .mob-nav-lnk { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
            padding:8px 6px; flex:1; font-size:7px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
            color:#52525b; transition:color .2s; min-height:52px; text-decoration:none; }
        .mob-nav-lnk.active { color:#f43f5e; }
        .mob-nav-lnk i { font-size:18px; }
    </style>
</head>
<body class="min-h-screen">

<!-- ═══════ HEADER ═══════ -->
<header class="px-5 pt-6 pb-4" style="background:rgba(7,7,9,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div id="master-avatar" class="w-11 h-11 rounded-2xl neo-gradient flex items-center justify-center font-black text-white text-lg">M</div>
            <div>
                <p id="master-name" class="text-sm font-black text-white leading-tight">—</p>
                <p class="text-[9px] text-rose-500 font-bold uppercase tracking-widest">Майстер · Wella Glow</p>
            </div>
        </div>
        <button onclick="doLogout()" class="w-9 h-9 rounded-xl bg-white/5 border border-white/8 flex items-center justify-center text-zinc-500 hover:text-rose-400 transition">
            <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
        </button>
    </div>
</header>

<!-- ═══════ MAIN ═══════ -->
<main class="px-5 pb-24 space-y-5 mt-4">

    <!-- HEADER STRIP -->
    <div class="glass-panel rounded-2xl p-5 flex items-center gap-4">
        <div class="w-16 h-16 rounded-2xl neo-gradient flex items-center justify-center font-black text-white text-2xl flex-shrink-0" id="p-avatar">M</div>
        <div>
            <p id="p-name" class="text-base font-black text-white">—</p>
            <p class="text-[9px] text-rose-500 font-bold uppercase tracking-widest mt-0.5">Майстер · Wella Glow</p>
            <div class="flex items-center gap-3 mt-2">
                <span class="text-[9px] text-zinc-500 font-bold" id="p-works-count">0 робіт</span>
                <span class="text-zinc-700">·</span>
                <span class="text-[9px] text-amber-400 font-bold" id="p-rating-str">— ★</span>
            </div>
        </div>
        <button class="ml-auto neo-gradient px-3 py-2 rounded-xl text-[9px] font-black text-white uppercase tracking-widest opacity-40 cursor-not-allowed">
            + Додати
        </button>
    </div>

    <!-- CATEGORY FILTERS (template) -->
    <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
        <button class="flex-shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest neo-gradient text-white">Всі</button>
        <button class="flex-shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest bg-white/5 text-zinc-500">Фарбування</button>
        <button class="flex-shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest bg-white/5 text-zinc-500">Стрижка</button>
        <button class="flex-shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest bg-white/5 text-zinc-500">Укладка</button>
        <button class="flex-shrink-0 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest bg-white/5 text-zinc-500">Догляд</button>
    </div>

    <!-- PORTFOLIO GRID (template mockup) -->
    <div>
        <div class="flex items-center justify-between mb-3">
            <h3 class="text-xs font-black text-white uppercase tracking-widest">Портфоліо</h3>
            <span class="text-[9px] text-zinc-600 font-bold">Незабаром</span>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <!-- Placeholder cards showing what portfolio will look like -->
            <div class="aspect-square rounded-xl overflow-hidden relative" style="background:linear-gradient(135deg,rgba(244,63,94,.15),rgba(251,113,133,.05));border:1px solid rgba(244,63,94,.15)">
                <div class="absolute inset-0 flex flex-col items-center justify-center gap-1">
                    <i class="fa-solid fa-image text-rose-500/30 text-2xl"></i>
                    <span class="text-[7px] text-zinc-700 font-bold uppercase">Фото</span>
                </div>
            </div>
            <div class="aspect-square rounded-xl overflow-hidden relative" style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)">
                <div class="absolute inset-0 flex flex-col items-center justify-center gap-1">
                    <i class="fa-solid fa-image text-zinc-700 text-2xl"></i>
                    <span class="text-[7px] text-zinc-700 font-bold uppercase">Фото</span>
                </div>
            </div>
            <div class="aspect-square rounded-xl overflow-hidden relative" style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)">
                <div class="absolute inset-0 flex flex-col items-center justify-center gap-1">
                    <i class="fa-solid fa-image text-zinc-700 text-2xl"></i>
                    <span class="text-[7px] text-zinc-700 font-bold uppercase">Фото</span>
                </div>
            </div>
            <div class="aspect-square rounded-xl overflow-hidden relative col-span-2" style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)">
                <div class="absolute inset-0 flex flex-col items-center justify-center gap-1">
                    <i class="fa-solid fa-image text-zinc-700 text-2xl"></i>
                    <span class="text-[7px] text-zinc-700 font-bold uppercase">Велике фото</span>
                </div>
            </div>
            <div class="aspect-square rounded-xl overflow-hidden relative" style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)">
                <div class="absolute inset-0 flex flex-col items-center justify-center gap-1">
                    <i class="fa-solid fa-image text-zinc-700 text-2xl"></i>
                    <span class="text-[7px] text-zinc-700 font-bold uppercase">Фото</span>
                </div>
            </div>
        </div>
    </div>

    <!-- COMING SOON BANNER -->
    <div class="glass-panel rounded-2xl p-5 text-center">
        <i class="fa-solid fa-rocket text-rose-500 text-2xl mb-3"></i>
        <p class="text-xs font-black text-white mb-1">Незабаром</p>
        <p class="text-[10px] text-zinc-500 leading-relaxed max-w-xs mx-auto">Завантажуйте фото своїх робіт, сортуйте за категоріями і діліться своїм публічним профілем з клієнтами</p>
    </div>

</main>

<!-- ═══════ MOBILE BOTTOM NAV ═══════ -->
<nav class="fixed bottom-0 left-0 right-0 z-50" style="background:rgba(7,7,9,.97);border-top:1px solid rgba(255,255,255,.06);backdrop-filter:blur(16px)">
    <div class="flex items-stretch">
        <a href="master-dashboard.html" class="mob-nav-lnk"><i class="fa-solid fa-house"></i><span>Головна</span></a>
        <a href="master-portfolio.html" class="mob-nav-lnk active"><i class="fa-solid fa-images"></i><span>Портфоліо</span></a>
        <a href="master-reviews.html" class="mob-nav-lnk"><i class="fa-solid fa-star"></i><span>Відгуки</span></a>
        <a href="master-history.html" class="mob-nav-lnk"><i class="fa-solid fa-clock-rotate-left"></i><span>Історія</span></a>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-init.js"></script>
<script>
    const masterName = localStorage.getItem('wella_staff_name') || 'Майстер';
    if (!localStorage.getItem('wella_staff_id')) window.location.href = 'staff-login.html';
    window.doLogout = function() {
        ['wella_staff_id','wella_staff_role','wella_staff_name'].forEach(k => localStorage.removeItem(k));
        window.location.href = 'staff-login.html';
    };
    document.getElementById('master-avatar').textContent = masterName.charAt(0).toUpperCase();
    document.getElementById('master-name').textContent = masterName;
    document.getElementById('p-avatar').textContent = masterName.charAt(0).toUpperCase();
    document.getElementById('p-name').textContent = masterName;
</script>
</body>
</html>
