<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wella Glow | Відгуки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        :root { --bg: #050505; --accent: #f43f5e; }
        body { font-family: 'Manrope', sans-serif; background-color: var(--bg); color: #e2e8f0; letter-spacing: -0.01em; }
        * { font-style: normal !important; }
        .glass-panel { background: rgba(17,17,19,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .neo-gradient { background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }
        .appt-row { border-bottom:1px solid rgba(255,255,255,.04); }
        .appt-row:last-child { border-bottom:none; }
        .mob-nav-lnk { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
            padding:8px 6px; flex:1; font-size:7px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
            color:#52525b; transition:color .2s; min-height:52px; text-decoration:none; }
        .mob-nav-lnk.active { color:#f43f5e; }
        .mob-nav-lnk i { font-size:18px; }
        .star { color: #fbbf24; }
        .star.empty { color: #27272a; }
    </style>
</head>
<body class="min-h-screen">

<!-- ═══════ HEADER ═══════ -->
<header class="px-5 pt-6 pb-4" style="background:rgba(7,7,9,.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div id="master-avatar" class="w-11 h-11 rounded-2xl neo-gradient flex items-center justify-center font-black text-white text-lg">M</div>
            <div>
                <p id="master-name" class="text-sm font-black text-white leading-tight">—</p>
                <p class="text-[9px] text-rose-500 font-bold uppercase tracking-widest">Майстер · Wella Glow</p>
            </div>
        </div>
        <button onclick="doLogout()" class="w-9 h-9 rounded-xl bg-white/5 border border-white/8 flex items-center justify-center text-zinc-500 hover:text-rose-400 transition">
            <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
        </button>
    </div>
</header>

<!-- ═══════ MAIN ═══════ -->
<main class="px-5 pb-24 space-y-5 mt-4">

    <!-- RATING SUMMARY -->
    <div class="glass-panel rounded-2xl p-5 flex items-center gap-5">
        <div class="text-center flex-shrink-0">
            <p id="avg-rating" class="text-4xl font-black text-amber-400">—</p>
            <div id="stars-row" class="flex gap-0.5 justify-center mt-1"></div>
            <p id="review-count" class="text-[9px] text-zinc-600 font-bold mt-1">0 відгуків</p>
        </div>
        <div class="flex-1 space-y-1.5" id="rating-bars">
            <!-- filled by JS -->
        </div>
    </div>

    <!-- REVIEWS LIST -->
    <div class="glass-panel rounded-2xl overflow-hidden">
        <div class="px-5 pt-4 pb-3 border-b border-white/5">
            <h3 class="text-xs font-black text-white uppercase tracking-widest">Усі відгуки</h3>
        </div>
        <div id="reviews-list" class="divide-y divide-white/4 px-5">
            <p class="py-8 text-center text-zinc-700 text-xs font-bold uppercase tracking-widest">Завантаження...</p>
        </div>
    </div>

</main>

<!-- ═══════ MOBILE BOTTOM NAV ═══════ -->
<nav class="fixed bottom-0 left-0 right-0 z-50" style="background:rgba(7,7,9,.97);border-top:1px solid rgba(255,255,255,.06);backdrop-filter:blur(16px)">
    <div class="flex items-stretch">
        <a href="master-dashboard.html" class="mob-nav-lnk"><i class="fa-solid fa-house"></i><span>Головна</span></a>
        <a href="master-portfolio.html" class="mob-nav-lnk"><i class="fa-solid fa-images"></i><span>Портфоліо</span></a>
        <a href="master-reviews.html" class="mob-nav-lnk active"><i class="fa-solid fa-star"></i><span>Відгуки</span></a>
        <a href="master-history.html" class="mob-nav-lnk"><i class="fa-solid fa-clock-rotate-left"></i><span>Історія</span></a>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-init.js"></script>
<script>
    const masterId   = localStorage.getItem('wella_staff_id');
    const masterName = localStorage.getItem('wella_staff_name') || 'Майстер';
    if (!masterId) window.location.href = 'staff-login.html';

    window.doLogout = function() {
        ['wella_staff_id','wella_staff_role','wella_staff_name'].forEach(k => localStorage.removeItem(k));
        window.location.href = 'staff-login.html';
    };

    function fmtDate(str) {
        if (!str) return '—';
        const d = new Date(str);
        return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
    }

    function starsHtml(rating, size = '11px') {
        let html = '';
        for (let i = 1; i <= 5; i++) {
            html += `<i class="fa-solid fa-star ${i <= rating ? 'star' : 'star empty'}" style="font-size:${size}"></i>`;
        }
        return html;
    }

    document.getElementById('master-avatar').textContent = masterName.charAt(0).toUpperCase();
    document.getElementById('master-name').textContent   = masterName;

    document.addEventListener('DOMContentLoaded', async () => {
        const { data: reviews } = await window.db
            .from('reviews')
            .select('*, clients(full_name)')
            .eq('staff_id', masterId)
            .order('created_at', { ascending: false });

        const list = document.getElementById('reviews-list');

        if (!reviews || !reviews.length) {
            list.innerHTML = `<p class="py-8 text-center text-zinc-700 text-xs font-bold uppercase tracking-widest">Ще немає відгуків</p>`;
            document.getElementById('avg-rating').textContent = '—';
            document.getElementById('review-count').textContent = '0 відгуків';
            return;
        }

        // Average
        const avg = reviews.reduce((s,r) => s + parseFloat(r.rating||0), 0) / reviews.length;
        document.getElementById('avg-rating').textContent  = avg.toFixed(1);
        document.getElementById('review-count').textContent = `${reviews.length} відгуків`;
        document.getElementById('stars-row').innerHTML = starsHtml(Math.round(avg), '13px');

        // Rating distribution bars
        const dist = [5,4,3,2,1].map(star => ({
            star,
            count: reviews.filter(r => Math.round(parseFloat(r.rating)) === star).length
        }));
        const maxDist = Math.max(...dist.map(d => d.count), 1);
        document.getElementById('rating-bars').innerHTML = dist.map(d => `
            <div class="flex items-center gap-2">
                <span class="text-[8px] font-black text-zinc-500 w-3 text-right">${d.star}</span>
                <i class="fa-solid fa-star text-amber-400" style="font-size:8px"></i>
                <div class="flex-1 h-1.5 rounded-full" style="background:rgba(255,255,255,.05)">
                    <div class="h-full rounded-full bg-amber-400/60 transition-all" style="width:${Math.round(d.count/maxDist*100)}%"></div>
                </div>
                <span class="text-[8px] font-bold text-zinc-600 w-4">${d.count}</span>
            </div>`).join('');

        // Review cards
        list.innerHTML = reviews.map(r => {
            const rating = parseFloat(r.rating || 0);
            return `
            <div class="appt-row py-4">
                <div class="flex items-start justify-between gap-3 mb-1">
                    <div>
                        <p class="text-[11px] font-bold text-white">${r.clients?.full_name || 'Клієнт'}</p>
                        <p class="text-[9px] text-zinc-600 mt-0.5">${fmtDate(r.created_at)}</p>
                    </div>
                    <div class="flex gap-0.5 flex-shrink-0">${starsHtml(Math.round(rating))}</div>
                </div>
                ${r.comment ? `<p class="text-[10px] text-zinc-400 leading-relaxed mt-2">${r.comment}</p>` : ''}
            </div>`;
        }).join('');
    });
</script>
</body>
</html>
