<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wella Glow | Панель власника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        :root { --bg: #050505; --accent: #f43f5e; }
        body { font-family: 'Manrope', sans-serif; background-color: var(--bg); color: #e2e8f0; letter-spacing: -0.01em; }
        * { font-style: normal !important; }
        .glass-panel { background: rgba(17, 17, 19, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neo-gradient { background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%); }
        .sidebar-link.active { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border-left: 3px solid #f43f5e; }
        
        /* Сяйво точок */
        .status-dot.active { background-color: #ec4899; box-shadow: 0 0 12px 2px rgba(236, 72, 153, 0.6); }
        .status-dot.waiting { background-color: #3f3f46; box-shadow: 0 0 8px 1px rgba(255, 255, 255, 0.1); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-16 lg:w-64 bg-black/50 border-r border-white/5 flex flex-col fixed h-full z-50">
        <div class="p-6">
            <h1 class="text-lg font-extrabold text-white tracking-tighter uppercase leading-none">Wella Glow</h1>
            <p class="text-[8px] text-rose-500 font-bold tracking-[0.4em] mt-1 uppercase">studio</p>
        </div>

        <nav class="flex-1 px-4 space-y-8 mt-4 overflow-y-auto no-scrollbar pb-4">
            <div>
                <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-3 ml-4 hidden lg:block">Аналітика</p>
                <div class="space-y-1">
                    <a href="#" class="sidebar-link active flex items-center gap-3 p-3 rounded-r-xl transition font-bold"><i class="fa-solid fa-chart-pie w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Дашборд</span></a>
                    <a href="admin-finance.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-wallet w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Фінанси</span></a>
                </div>
            </div>
            <div>
                <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-3 ml-4 hidden lg:block">Студія</p>
                <div class="space-y-1">
                    <a href="admin-calendar.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-calendar-check w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Записи</span></a>
                    <a href="admin-staff.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-users-gear w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Персонал</span></a>
                    <a href="admin-inventory.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-boxes-stacked w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Склад</span></a>
                </div>
            </div>
            <div>
                <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-3 ml-4 hidden lg:block">Клієнти</p>
                <div class="space-y-1">
                    <a href="admin-clients-base.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-address-book w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">База клієнтів</span></a>
                    <a href="admin-bonuses.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-gift w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Бонуси</span></a>
                </div>
            </div>
        </nav>
        <!-- ── Month Selector ── -->
        <div class="px-3 pb-2 hidden lg:block">
            <div class="flex items-center gap-1 p-2 rounded-xl" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)">
                <button onclick="monthStep(-1)" class="w-6 h-6 flex items-center justify-center rounded-lg text-zinc-500 hover:text-white hover:bg-white/5 transition text-xs"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="sidebar-month-label" class="text-[10px] font-black uppercase tracking-widest text-zinc-300 flex-1 text-center">—</span>
                <button onclick="monthStep(1)" class="w-6 h-6 flex items-center justify-center rounded-lg text-zinc-500 hover:text-white hover:bg-white/5 transition text-xs"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        <!-- ── Profile + Logout ── -->
        <div class="border-t border-white/5 p-3">
            <div class="flex items-center gap-3">
                <div id="sidebar-avatar" class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-white font-black text-xs" style="background:linear-gradient(135deg,#f43f5e,#fb7185)">A</div>
                <div class="hidden lg:block flex-1 min-w-0">
                    <p id="sidebar-uname" class="text-xs font-bold text-white truncate">—</p>
                    <p id="sidebar-urole" class="text-[9px] text-zinc-500 uppercase tracking-widest">—</p>
                </div>
                <button onclick="doLogout()" title="Вийти" class="hidden lg:flex w-7 h-7 items-center justify-center rounded-lg text-zinc-600 hover:text-rose-400 hover:bg-rose-500/10 transition flex-shrink-0">
                    <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
                </button>
            </div>
            <button onclick="doLogout()" class="lg:hidden mt-2 w-full flex items-center justify-center p-2 rounded-lg text-zinc-600 hover:text-rose-400 hover:bg-rose-500/10 transition">
                <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 ml-16 lg:ml-64 p-5 lg:p-8">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-extrabold text-white tracking-tight">Панель власника</h2>
            <button class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center text-zinc-400"><i class="fa-solid fa-gear"></i></button>
        </header>

        <!-- KPI КАРТКИ (5 ШТУК) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
            <div class="glass-panel p-5 rounded-2xl">
                <p class="text-zinc-500 text-[9px] uppercase font-black mb-2 tracking-widest">Прибуток</p>
                <h3 id="kpi-profit" class="text-2xl font-black text-white tracking-tighter">₴0</h3>
                <div class="mt-3 h-1 w-full bg-zinc-900 rounded-full overflow-hidden"><div id="kpi-profit-bar" class="h-full bg-rose-500" style="width: 0%"></div></div>
            </div>
            <div class="glass-panel p-5 rounded-2xl">
                <p class="text-zinc-500 text-[9px] uppercase font-black mb-2 tracking-widest">Нові клієнти</p>
                <div class="flex items-center justify-between"><h3 id="kpi-new-clients" class="text-2xl font-black text-white tracking-tighter">0</h3><span id="kpi-clients-trend" class="text-emerald-400 text-[10px] font-black">+0%</span></div>
            </div>
            <div class="glass-panel p-5 rounded-2xl">
                <p class="text-zinc-500 text-[9px] uppercase font-black mb-2 tracking-widest">Записи міс.</p>
                <h3 id="kpi-total-bookings" class="text-2xl font-black text-white tracking-tighter">0</h3>
                <div id="kpi-bookings-bars" class="mt-3 flex gap-0.5">
                    <div class="h-1 flex-1 bg-zinc-800 rounded-full"></div><div class="h-1 flex-1 bg-zinc-800 rounded-full"></div><div class="h-1 flex-1 bg-zinc-800 rounded-full"></div><div class="h-1 flex-1 bg-zinc-800 rounded-full"></div>
                </div>
            </div>
            <div class="glass-panel p-5 rounded-2xl">
                <p class="text-zinc-500 text-[9px] uppercase font-black mb-2 tracking-widest">Середній чек</p>
                <h3 id="kpi-avg-bill" class="text-2xl font-black text-white tracking-tighter">₴0</h3>
            </div>
            <div class="glass-panel p-5 rounded-2xl border-l-2 border-emerald-500">
                <p class="text-zinc-500 text-[9px] uppercase font-black mb-2 tracking-widest">Retention Rate</p>
                <h3 id="kpi-retention" class="text-2xl font-black text-white tracking-tighter">0%</h3>
            </div>
        </div>

        <!-- ГРАФІК 3/4 ТА ТАЙМЛАЙН 1/4 -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="lg:col-span-3 glass-panel p-6 rounded-3xl">
                <h4 class="text-xs font-black text-white uppercase tracking-widest mb-6">Аналітика доходів</h4>
                <div class="h-72"><canvas id="profitChart"></canvas></div>
            </div>
            <div class="lg:col-span-1 glass-panel p-6 rounded-3xl">
                <h4 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-8 leading-none">Візити сьогодні</h4>
                <div id="today-timeline" class="relative space-y-8">
                    <!-- Завантажиться через JS (з майстром!) -->
                </div>
            </div>
        </div>

        <!-- ТАБЛИЦЯ 3/4 ТА СКЛАД 1/4 -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 glass-panel p-6 rounded-3xl">
                <h4 class="text-xs font-black text-white uppercase tracking-widest mb-4">Ефективність майстрів</h4>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <tbody id="staff-efficiency-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
            <div class="lg:col-span-1 glass-panel p-6 rounded-3xl">
                <h4 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-6 leading-none">Стан складу</h4>
                <div id="stock-status-list" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/owner-dashboard.js"></script>
</body>
</html>
