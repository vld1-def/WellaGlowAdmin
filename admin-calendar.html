<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wella Glow | Записи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        :root { --bg:#050505; --accent:#f43f5e; }
        body { font-family:'Manrope',sans-serif; background:var(--bg); color:#e2e8f0; letter-spacing:-0.01em; }
        * { font-style:normal !important; }
        .glass-panel { background:rgba(17,17,19,0.6); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.05); }
        .neo-gradient { background:linear-gradient(135deg,#f43f5e 0%,#fb7185 100%); }
        .sidebar-link.active { background:rgba(244,63,94,0.1); color:#f43f5e; border-left:3px solid #f43f5e; }
        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-thumb { background:#1e1e21; border-radius:10px; }
        .skeleton { background:linear-gradient(90deg,#111113 25%,#1a1a1d 50%,#111113 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
        @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

        /* Drawers */
        #appt-drawer { transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); }
        #appt-drawer.open { transform:translateX(0); }
        #appt-detail-drawer { transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); }
        #appt-detail-drawer.open { transform:translateX(0); }
        #drawer-overlay { opacity:0; pointer-events:none; transition:opacity 0.35s ease; }
        #drawer-overlay.open { opacity:1; pointer-events:all; }

        /* Form inputs */
        .cal-input {
            width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
            border-radius:12px; padding:11px 14px; color:#e2e8f0; font-size:13px;
            font-family:'Manrope',sans-serif; font-weight:600; outline:none; transition:border-color 0.2s;
        }
        .cal-input:focus { border-color:rgba(244,63,94,0.5); }
        .cal-input option { background:#111113; color:#e2e8f0; }

        /* View toggle */
        .view-btn { padding:7px 16px; border-radius:9px; font-size:10px; font-weight:800;
            text-transform:uppercase; letter-spacing:0.08em; cursor:pointer; transition:all 0.2s; color:#52525b; }
        .view-btn.active { background:rgba(244,63,94,0.12); color:#f43f5e; }

        /* Week grid */
        .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; min-height:520px; }
        .day-col { min-height:520px; border-radius:12px; padding:6px; display:flex; flex-direction:column; gap:4px; }
        .day-col.today { background:rgba(244,63,94,0.04); border:1px solid rgba(244,63,94,0.15); }
        .day-col:not(.today) { background:rgba(255,255,255,0.015); border:1px solid rgba(255,255,255,0.04); }
        .day-header { padding:6px 4px 8px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom:2px; flex-shrink:0; }
        .day-name { font-size:8px; text-transform:uppercase; letter-spacing:0.12em; font-weight:800; color:#52525b; }
        .day-num  { font-size:18px; font-weight:800; color:#71717a; line-height:1.1; margin-top:2px; }
        .day-col.today .day-num { color:#f43f5e; }
        .day-col.today .day-name { color:#f43f5e; }

        /* Appointment card */
        .appt-card {
            border-radius:9px; padding:7px 8px; cursor:pointer;
            border-left:3px solid; transition:all 0.15s; flex-shrink:0;
            position:relative; overflow:hidden;
        }
        .appt-card:hover { filter:brightness(1.12); transform:translateY(-1px); }
        .appt-card::before { content:''; position:absolute; inset:0; background:inherit; opacity:0.12; }
        .appt-card-inner { position:relative; }

        /* Month grid */
        .month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
        .month-day {
            min-height:90px; border-radius:10px; padding:6px;
            background:rgba(255,255,255,0.015); border:1px solid rgba(255,255,255,0.04);
            cursor:default; transition:background 0.15s;
        }
        .month-day.today { background:rgba(244,63,94,0.04); border-color:rgba(244,63,94,0.2); }
        .month-day.other-month { opacity:0.35; }
        .month-day.has-appts:hover { background:rgba(255,255,255,0.03); }
        .month-day-num { font-size:11px; font-weight:800; color:#52525b; margin-bottom:4px; }
        .month-day.today .month-day-num { color:#f43f5e; }
        .month-dot { height:5px; border-radius:3px; margin-bottom:2px; }

        /* Status badge */
        .status-done    { background:rgba(16,185,129,0.12); color:#10b981; border:1px solid rgba(16,185,129,0.2); }
        .status-pending { background:rgba(251,191,36,0.12); color:#fbbf24; border:1px solid rgba(251,191,36,0.2); }
        .status-cancel  { background:rgba(244,63,94,0.08); color:#f43f5e; border:1px solid rgba(244,63,94,0.15); }
        .status-new     { background:rgba(99,102,241,0.12); color:#818cf8; border:1px solid rgba(99,102,241,0.2); }

        /* Master filter pill */
        .master-pill { padding:5px 12px; border-radius:20px; font-size:9px; font-weight:800;
            text-transform:uppercase; letter-spacing:0.08em; cursor:pointer; transition:all 0.2s;
            border:1.5px solid rgba(255,255,255,0.07); color:#52525b; }
        .master-pill.active { color:#fff; border-color:transparent; }
    </style>
</head>
<body class="flex min-h-screen">

<!-- ═══════════════════ SIDEBAR ═══════════════════ -->

    <div class="p-6">
        <h1 class="text-lg font-extrabold text-white tracking-tighter uppercase leading-none hidden lg:block">Wella Glow</h1>
        <h1 class="text-lg font-extrabold text-white tracking-tighter uppercase leading-none lg:hidden">W</h1>
        <p class="text-[8px] text-rose-500 font-bold tracking-[0.4em] mt-1 uppercase hidden lg:block">studio</p>
    </div>
    <nav class="flex-1 px-4 space-y-8 mt-4 overflow-y-auto pb-10">
        <div>
            <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-3 ml-4 hidden lg:block">Аналітика</p>
            <div class="space-y-1">
                <a href="owner-dashboard.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-chart-pie w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Дашборд</span></a>
                <a href="admin-finance.html"   class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-wallet w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Фінанси</span></a>
            </div>
        </div>
        <div>
            <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-3 ml-4 hidden lg:block">Студія</p>
            <div class="space-y-1">
                <a href="admin-calendar.html" class="sidebar-link active flex items-center gap-3 p-3 rounded-r-xl transition font-bold"><i class="fa-solid fa-calendar-check w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Записи</span></a>
                <a href="admin-staff.html"    class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-users-gear w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Персонал</span></a>
                <a href="admin-inventory.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-boxes-stacked w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Склад</span></a>
            </div>
        </div>
        <div>
            <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-3 ml-4 hidden lg:block">Клієнти</p>
            <div class="space-y-1">
                <a href="admin-clients-base.html" class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-address-book w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">База клієнтів</span></a>
                <a href="admin-bonuses.html"       class="sidebar-link flex items-center gap-3 p-3 text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-gift w-4"></i><span class="hidden lg:block text-xs uppercase tracking-widest">Бонуси</span></a>
            </div>
        </div>
    </nav>
</aside>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<main class="flex-1 ml-16 lg:ml-64 p-5 lg:p-8 flex flex-col gap-6">

    <!-- HEADER -->
    <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
        <div>
            <h2 class="text-2xl font-extrabold text-white tracking-tight">Записи</h2>
            <p id="period-label" class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold mt-1">—</p>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
            <!-- View toggle -->
            <div class="glass-panel rounded-xl p-1 flex items-center gap-1">
                <button id="btn-week"  onclick="setView('week')"  class="view-btn active">Тиждень</button>
                <button id="btn-month" onclick="setView('month')" class="view-btn">Місяць</button>
            </div>
            <!-- Nav -->
            <div class="glass-panel rounded-xl flex items-center">
                <button onclick="navPrev()" class="w-9 h-9 flex items-center justify-center text-zinc-500 hover:text-white transition rounded-l-xl"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                <button onclick="goToday()"  class="px-3 py-2 text-[10px] font-black uppercase tracking-widest text-zinc-400 hover:text-white transition border-x border-white/5">Сьогодні</button>
                <button onclick="navNext()" class="w-9 h-9 flex items-center justify-center text-zinc-500 hover:text-white transition rounded-r-xl"><i class="fa-solid fa-chevron-right text-xs"></i></button>
            </div>
            <!-- Add -->
            <button onclick="openApptDrawer()" class="neo-gradient px-5 py-3 rounded-xl text-[10px] font-black text-white uppercase tracking-widest flex items-center gap-2 hover:opacity-90 transition">
                <i class="fa-solid fa-plus"></i>
                <span class="hidden sm:inline">Новий запис</span>
            </button>
        </div>
    </header>

    <!-- KPI STRIP -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div class="glass-panel rounded-xl px-4 py-3 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(244,63,94,0.12)">
                <i class="fa-solid fa-calendar-day text-rose-500 text-xs"></i>
            </div>
            <div>
                <p class="text-[8px] text-zinc-600 uppercase font-black tracking-widest">Сьогодні</p>
                <p id="kpi-today" class="text-lg font-extrabold text-white leading-tight">—</p>
            </div>
        </div>
        <div class="glass-panel rounded-xl px-4 py-3 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(16,185,129,0.12)">
                <i class="fa-solid fa-hryvnia-sign text-emerald-400 text-xs"></i>
            </div>
            <div>
                <p class="text-[8px] text-zinc-600 uppercase font-black tracking-widest">Виручка / тиждень</p>
                <p id="kpi-week-revenue" class="text-lg font-extrabold text-white leading-tight">—</p>
            </div>
        </div>
        <div class="glass-panel rounded-xl px-4 py-3 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(251,191,36,0.12)">
                <i class="fa-solid fa-clock text-amber-400 text-xs"></i>
            </div>
            <div>
                <p class="text-[8px] text-zinc-600 uppercase font-black tracking-widest">Виконано / тиждень</p>
                <p id="kpi-week-done" class="text-lg font-extrabold text-white leading-tight">—</p>
            </div>
        </div>
        <div class="glass-panel rounded-xl px-4 py-3 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(99,102,241,0.12)">
                <i class="fa-solid fa-users text-indigo-400 text-xs"></i>
            </div>
            <div>
                <p class="text-[8px] text-zinc-600 uppercase font-black tracking-widest">Всього / тиждень</p>
                <p id="kpi-week-total" class="text-lg font-extrabold text-white leading-tight">—</p>
            </div>
        </div>
    </div>

    <!-- MASTER FILTER -->
    <div class="flex items-center gap-2 flex-wrap">
        <span class="text-[9px] text-zinc-600 uppercase font-black tracking-widest">Майстер:</span>
        <div id="master-filters" class="flex items-center gap-2 flex-wrap">
            <button class="master-pill active" data-id="" style="background:#f43f5e22; border-color:#f43f5e55; color:#f43f5e" onclick="filterMaster('')">Всі</button>
        </div>
    </div>

    <!-- CALENDAR AREA -->
    <div class="glass-panel rounded-2xl p-4 lg:p-5 flex-1">

        <!-- WEEK VIEW -->
        <div id="week-view">
            <!-- Day names header -->
            <div class="grid grid-cols-7 gap-[3px] mb-[3px]">
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Пн</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Вт</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Ср</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Чт</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Пт</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Сб</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Нд</div>
            </div>
            <div id="week-grid" class="week-grid">
                <!-- filled by JS -->
            </div>
        </div>

        <!-- MONTH VIEW -->
        <div id="month-view" class="hidden">
            <div class="grid grid-cols-7 gap-[2px] mb-[2px]">
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Пн</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Вт</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Ср</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Чт</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Пт</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Сб</div>
                <div class="text-center text-[8px] text-zinc-600 font-black uppercase tracking-widest py-1">Нд</div>
            </div>
            <div id="month-grid" class="month-grid"></div>
        </div>
    </div>
</main>

<!-- ═══════════════════ OVERLAY ═══════════════════ -->
<div id="drawer-overlay" onclick="closeAllDrawers()" class="fixed inset-0 bg-black/60 backdrop-blur-sm" style="z-index:60"></div>

<!-- ═══════════════════ NEW/EDIT APPOINTMENT DRAWER ═══════════════════ -->
<div id="appt-drawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-[#0d0d0f] border-l border-white/8 overflow-y-auto" style="z-index:70">
    <div class="p-6">
        <div class="flex items-center justify-between mb-6">
            <h3 id="appt-drawer-title" class="text-sm font-black uppercase tracking-widest text-white">Новий запис</h3>
            <button onclick="closeAllDrawers()" class="text-zinc-600 hover:text-white transition text-lg"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="text-[9px] text-zinc-500 font-black uppercase tracking-widest block mb-2">Клієнт *</label>
                <select id="a-client" class="cal-input">
                    <option value="">— Оберіть клієнта —</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] text-zinc-500 font-black uppercase tracking-widest block mb-2">Послуга *</label>
                <select id="a-service" class="cal-input" onchange="onServiceChange()">
                    <option value="">— Оберіть послугу —</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] text-zinc-500 font-black uppercase tracking-widest block mb-2">Майстер *</label>
                <select id="a-master" class="cal-input">
                    <option value="">— Оберіть майстра —</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[9px] text-zinc-500 font-black uppercase tracking-widest block mb-2">Дата *</label>
                    <input id="a-date" type="date" class="cal-input">
                </div>
                <div>
                    <label class="text-[9px] text-zinc-500 font-black uppercase tracking-widest block mb-2">Ціна (₴)</label>
                    <input id="a-price" type="number" placeholder="0" class="cal-input">
                </div>
            </div>
            <div>
                <label class="text-[9px] text-zinc-500 font-black uppercase tracking-widest block mb-2">Статус</label>
                <select id="a-status" class="cal-input">
                    <option value="Новий">Новий</option>
                    <option value="Підтверджено">Підтверджено</option>
                    <option value="Виконано">Виконано</option>
                    <option value="Скасовано">Скасовано</option>
                </select>
            </div>
        </div>
        <!-- Price hint from service -->
        <div id="service-hint" class="hidden mt-2 p-3 rounded-xl text-[10px] font-semibold text-zinc-500" style="background:rgba(255,255,255,0.03)">
            <i class="fa-solid fa-circle-info text-zinc-600 mr-1"></i>
            <span id="service-hint-text"></span>
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="closeAllDrawers()" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/10 text-zinc-500 hover:text-white transition">Скасувати</button>
            <button onclick="saveAppt()" class="flex-1 neo-gradient py-3 rounded-xl text-[10px] font-black text-white uppercase tracking-widest hover:opacity-90 transition">Зберегти</button>
        </div>
    </div>
</div>

<!-- ═══════════════════ APPOINTMENT DETAIL DRAWER ═══════════════════ -->
<div id="appt-detail-drawer" class="fixed top-0 right-0 h-full w-full max-w-sm bg-[#0d0d0f] border-l border-white/8 overflow-y-auto" style="z-index:70">
    <div class="p-6">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-sm font-black uppercase tracking-widest text-white">Деталі запису</h3>
            <button onclick="closeAllDrawers()" class="text-zinc-600 hover:text-white transition text-lg"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="detail-body" class="space-y-3"></div>
        <div class="flex gap-2 mt-6">
            <button id="detail-edit-btn" onclick="" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/10 text-zinc-400 hover:text-white transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-pen text-xs"></i> Редагувати
            </button>
            <button id="detail-done-btn" onclick="" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-emerald-400 hover:bg-emerald-400/10 border border-emerald-400/20 transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-check text-xs"></i> Виконано
            </button>
            <button id="detail-cancel-btn" onclick="" class="py-3 px-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-rose-500 hover:bg-rose-500/10 border border-rose-500/15 transition">
                <i class="fa-solid fa-xmark text-xs"></i>
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-init.js"></script>
<script src="js/admin-calendar.js"></script>
</body>
</html>
