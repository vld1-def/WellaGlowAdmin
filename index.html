<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wella Glow | Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        :root { --bg: #050505; --accent: #f43f5e; }
        body { font-family: 'Manrope', sans-serif; background-color: var(--bg); color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100dvh; margin: 0; }
        .glass-panel { background: rgba(17, 17, 19, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neo-gradient { background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%); }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #e2e8f0; font-size: 14px; padding: 14px; border-radius: 16px; outline: none; width: 100%; transition: 0.3s; }
        .input-dark:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }
        * { font-style: normal !important; }
    </style>
</head>
<body>

    <div class="max-w-md w-full p-6">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-extrabold text-white tracking-tighter uppercase leading-none">Wella Glow</h1>
            <p class="text-[9px] text-rose-500 font-bold tracking-[0.5em] uppercase mt-2">Management Portal</p>
        </div>

        <div class="glass-panel p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
            <div class="mb-8">
                <h3 class="text-xl font-black text-white uppercase tracking-tighter">Вхід для персоналу</h3>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-2">Доступ до системи управління</p>
            </div>

            <form id="staffLoginForm" class="space-y-6" autocomplete="off">
                <div class="space-y-2">
                    <label class="text-[9px] text-zinc-500 uppercase font-black ml-1 tracking-widest">Логін (Телефон)</label>
                    <input type="tel" id="staffPhone" placeholder="099 000 00 00" class="input-dark" required>
                </div>

                <div class="space-y-2">
                    <label class="text-[9px] text-zinc-500 uppercase font-black ml-1 tracking-widest">Пароль доступу</label>
                    <input type="password" id="staffPassword" placeholder="••••••••" class="input-dark" required>
                </div>

                <button type="submit" class="neo-gradient w-full py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.3em] text-white shadow-xl shadow-rose-500/10 mt-4 transition active:scale-95">
                    Авторизуватись
                </button>
            </form>
        </div>

        <p class="text-center mt-8 text-[9px] text-zinc-700 font-bold uppercase tracking-widest">
            Тільки для авторизованого персоналу студії
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/staff-auth.js"></script>
</body>
</html>
